name: Metrik
options:
  bundleIdPrefix: com.metrik
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual

targets:
  Metrik:
    type: application
    platform: macOS
    sources:
      - path: Metrik
        excludes:
          - "*.entitlements"
          - Info.plist
      - path: MetrikShared
    info:
      path: Metrik/Info.plist
      properties:
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metrik.app
        INFOPLIST_KEY_CFBundleDisplayName: Metrik
        PRODUCT_NAME: Metrik
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
    dependencies: []

  MetrikShared:
    type: framework
    platform: macOS
    sources:
      - path: MetrikShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metrik.shared
        PRODUCT_NAME: MetrikShared

  MetrikTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MetrikTests
    dependencies:
      - target: Metrik
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metrik.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Metrik.app/Contents/MacOS/Metrik"
        BUNDLE_LOADER: "$(TEST_HOST)"
