name: Metrik
options:
  bundleIdPrefix: com.metrik
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic

targets:
  Metrik:
    type: application
    platform: macOS
    sources:
      - path: Metrik
        excludes:
          - "*.entitlements"
          - Info.plist
      - path: MetrikShared
    info:
      path: Metrik/Info.plist
      properties:
        LSUIElement: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metrik.app
        INFOPLIST_KEY_CFBundleDisplayName: Metrik
        CODE_SIGN_ENTITLEMENTS: Metrik/Metrik.entitlements
        PRODUCT_NAME: Metrik
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
    entitlements:
      path: Metrik/Metrik.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.metrik
    dependencies:
      - target: MetrikWidgetExtension

  MetrikShared:
    type: framework
    platform: macOS
    sources:
      - path: MetrikShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metrik.shared
        PRODUCT_NAME: MetrikShared

  MetrikWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: MetrikWidget
      - path: MetrikShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metrik.app.widget
        INFOPLIST_KEY_CFBundleDisplayName: MetrikWidget
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGN_ENTITLEMENTS: MetrikWidget/MetrikWidget.entitlements
        PRODUCT_NAME: MetrikWidgetExtension
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    entitlements:
      path: MetrikWidget/MetrikWidget.entitlements
    info:
      path: MetrikWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  MetrikTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MetrikTests
    dependencies:
      - target: Metrik
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metrik.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Metrik.app/Contents/MacOS/Metrik"
        BUNDLE_LOADER: "$(TEST_HOST)"
